<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap de SQL interactivo</title>
    <style>
        /* --- ESTILOS GENERALES DE LA PÁGINA --- */
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #0b0f19; /* Fondo oscuro profundo */
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 2.5rem;
            color: #06b6d4; /* Turquesa / Cian */
            text-align: center;
            font-weight: 800;
        }

        .subtitle {
            margin-bottom: 40px;
            color: #94a3b8;
            text-align: center;
            max-width: 600px;
            font-size: 1.1rem;
        }

        /* --- CONTENEDOR DEL ROADMAP --- */
        .roadmap-wrapper {
            width: 100%;
            max-width: 900px;
            background-color: #111827;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid #1e293b;
        }

        svg {
            display: block;
            width: 100%;
            height: auto;
            overflow: visible; /* Clave para que los hovers no se corten */
        }

        /* --- ESTILOS DE LAS FLECHAS (PATHS) --- */
        .conector-flecha {
            stroke: #06b6d4;
            stroke-width: 4;
            fill: none;
            stroke-dasharray: 8 5; /* Línea discontinua */
            animation: flujoLineal 25s linear infinite;
        }

        #punta-flecha path {
            fill: #06b6d4;
        }

        /* --- ESTILOS DE LOS BLOQUES (NODOS) --- */
        .nodo-bloque {
            cursor: pointer;
        }

        .nodo-bloque rect {
            fill: #1f2937;
            stroke: #374151;
            stroke-width: 2;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        fill 0.3s ease, 
                        stroke 0.3s ease, 
                        filter 0.3s ease;
            transform-origin: center;
        }

        /* Estilos del Texto dentro del SVG */
        .nodo-bloque text {
            font-size: 15px;
            font-weight: 700;
            fill: #f3f4f6;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none; /* El texto no bloquea el hover del ratón */
            transition: fill 0.3s ease;
        }

        .nodo-bloque .subtitulo-nodo {
            font-size: 12px;
            font-weight: 400;
            fill: #9ca3af;
        }

        /* --- INTERACTIVIDAD (HOVER) --- */
        .nodo-bloque:hover rect {
            fill: #06b6d4;
            stroke: #22d3ee;
            transform: scale(1.04) translateY(-4px);
            filter: drop-shadow(0 12px 20px rgba(6, 182, 212, 0.35));
        }

        .nodo-bloque:hover text {
            fill: #0f172a;
        }

        .nodo-bloque:hover .subtitulo-nodo {
            fill: #1e293b;
            font-weight: 600;
        }

        /* --- ANIMACIÓN DE LAS FLECHAS --- */
        @keyframes flujoLineal {
            to {
                stroke-dashoffset: -500;
            }
        }
    </style>
</head>
<body>

    <h1>Ruta de Aprendizaje: SQL Master</h1>
    <p class="subtitle">Descubre el camino desde la sintaxis básica hasta la optimización avanzada de bases de datos relacionales.</p>

    <div class="roadmap-wrapper">
        <svg viewBox="0 0 850 500" xmlns="http://www.w3.org/2000/svg">
            
            <defs>
                <marker id="punta-flecha" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 1 L 10 5 L 0 9 z" />
                </marker>
            </defs>

            <path d="M 240 100 L 340 100" class="conector-flecha" marker-end="url(#punta-flecha)" />
            
            <path d="M 590 100 C 720 100, 720 280, 590 280" class="conector-flecha" marker-end="url(#punta-flecha)" />
            
            <path d="M 350 280 L 250 280" class="conector-flecha" marker-end="url(#punta-flecha)" />
            
            <path d="M 110 280 C -10 280, -10 430, 110 430" class="conector-flecha" marker-end="url(#punta-flecha)" />

            <path d="M 240 430 L 340 430" class="conector-flecha" marker-end="url(#punta-flecha)" />


            <g class="nodo-bloque">
                <rect x="20" y="50" width="220" height="100" rx="14" />
                <text x="130" y="92">1. Fundamentos Básicos</text>
                <text x="130" y="115" class="subtitulo-nodo">SELECT, WHERE, ORDER BY</text>
            </g>

            <g class="nodo-bloque">
                <rect x="350" y="50" width="240" height="100" rx="14" />
                <text x="470" y="92">2. Relaciones y Joins</text>
                <text x="470" y="115" class="subtitulo-nodo">INNER, LEFT, RIGHT, FULL</text>
            </g>

            <g class="nodo-bloque">
                <rect x="350" y="230" width="240" height="100" rx="14" />
                <text x="470" y="272">3. Agrupaciones</text>
                <text x="470" y="295" class="subtitulo-nodo">GROUP BY, HAVING, COUNT</text>
            </g>

            <g class="nodo-bloque">
                <rect x="20" y="230" width="220" height="100" rx="14" />
                <text x="130" y="272">4. Subconsultas</text>
                <text x="130" y="295" class="subtitulo-nodo">Subqueries & CTEs (WITH)</text>
            </g>

            <g class="nodo-bloque">
                <rect x="20" y="380" width="220" height="100" rx="14" />
                <text x="130" y="422">5. Window Functions</text>
                <text x="130" y="445" class="subtitulo-nodo">RANK, LEAD, LAG, PARTITION</text>
            </g>

            <g class="nodo-bloque">
                <rect x="350" y="380" width="240" height="100" rx="14" />
                <text x="470" y="422">6. Tuning & Optimización</text>
                <text x="470" y="445" class="subtitulo-nodo">Indexación, Execution Plans</text>
            </g>

        </svg>
    </div>

</body>
</html>
